name: Build installers

# Run manually (Actions tab → Run workflow) or on a version tag. Tag pushes also
# publish the installers as a GitHub Release on the PUBLIC vectro-site repo, which
# is what https://serhii-leniv.github.io/vectro-site links its download buttons to.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-14
            script: package:mac
          - name: Windows
            os: windows-latest
            script: package:win
          # macOS (Intel / macos-13) is intentionally omitted: those runners sit
          # queued for 24h in this project and blocked every release (the release
          # job needs the whole matrix). The site only offers Apple Silicon + Windows.
          # Re-add `{ name: macOS (Intel), os: macos-13, script: package:mac }` when
          # an Intel build is actually shipped.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # .npmrc pins runtime=electron target=29.4.6 so the right prebuilt
      # node-pty binary is fetched for this runner's OS/arch.
      - run: npm ci
      - run: npm run ${{ matrix.script }}
      - uses: actions/upload-artifact@v4
        with:
          name: Vectro-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
          if-no-files-found: ignore

  # Publish the installers as a Release on the public download-site repo, so the
  # site's releases/latest/download/<fixed-name> links resolve. Tag pushes only.
  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish to vectro-site Releases
        uses: softprops/action-gh-release@v2
        with:
          # Cross-repo publish needs a PAT with `contents:write` on vectro-site.
          # Add it as a repo secret named SITE_RELEASE_TOKEN (see README).
          token: ${{ secrets.SITE_RELEASE_TOKEN }}
          repository: Serhii-Leniv/vectro-site
          tag_name: ${{ github.ref_name }}
          name: Vectro ${{ github.ref_name }}
          draft: false
          # Must be a full release, not a prerelease: the site's download buttons
          # use GitHub's releases/latest API, which skips prereleases — a prerelease
          # would publish but never be served to users.
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            artifacts/*.dmg
            artifacts/*.exe
            artifacts/*.AppImage
