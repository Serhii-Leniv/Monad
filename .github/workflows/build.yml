name: Build installers

# Run manually (Actions tab → Run workflow) or on a version tag. On a version tag
# each build job attaches its installer to a GitHub Release ON THIS repo
# (Serhii-Leniv/Monad) using the built-in GITHUB_TOKEN. That release IS the
# published release: the download site (GitHub Pages on this repo's gh-pages
# branch) and the in-app update check both read this repo's releases/latest.
#
# Why not upload-artifact?
#  - Actions ARTIFACT storage is a metered quota that fills up (old build outputs)
#    and, once hit, blocks every upload for 6-12h — it took down releases. Release
#    ASSETS are separate storage (free/unmetered for public repos), so attaching to
#    a Release sidesteps the quota entirely.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Both matrix jobs attach to the same tag's release; serialize them so they don't
# race on creating it.
concurrency: release-${{ github.ref_name }}

jobs:
  # Gate: packaging used to run NO checks at all, so tagging could ship code that
  # never passed CI. Reuses ci.yml verbatim rather than duplicating its steps.
  validate:
    uses: ./.github/workflows/ci.yml

  build:
    name: ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # create/update the Release on this repo via GITHUB_TOKEN
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-14
            script: package:mac
          - name: Windows
            os: windows-latest
            script: package:win
          # macOS (Intel / macos-13) is intentionally omitted: those runners sit
          # queued for 24h in this project and blocked every release. The site only
          # offers Apple Silicon + Windows. Re-add
          # `{ name: macOS (Intel), os: macos-13, script: package:mac }` to ship Intel.
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      # .npmrc pins runtime=electron target=29.4.6 so the right prebuilt
      # node-pty binary is fetched for this runner's OS/arch.
      - run: npm ci

      # macOS and Windows build in separate steps so the Apple signing secrets are
      # never present on the Windows runner — electron-builder reads CSC_LINK on
      # every platform and would try to sign the NSIS installer with the mac cert.
      #
      # The secrets are read into MAC_CERT_* / APPLE_* names and only re-exported
      # under the names electron-builder looks for when a cert is actually there.
      # They CANNOT be passed as CSC_LINK directly: Actions still defines an env key
      # whose secret is missing, just with an empty value, and electron-builder tests
      # for the presence of CSC_LINK rather than a non-empty one. It then resolves ""
      # to the working directory and fails with "<workspace> not a file" — which is
      # exactly how run 29743588647 died.
      #
      # So: no cert -> CSC_* stay undefined, CSC_IDENTITY_AUTO_DISCOVERY=false,
      # electron-builder skips signing and (app being unsigned) skips notarization;
      # scripts/afterPack.cjs ad-hoc signs and the .dmg needs `xattr` on install.
      # Add the five secrets and the same tag yields a signed, notarized build with
      # no workflow change. See docs/RELEASING.md.
      - name: Build installer (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ -n "$MAC_CERT_P12" ]; then
            echo "Developer ID cert present — signing and notarizing."
            export CSC_LINK="$MAC_CERT_P12"
            export CSC_KEY_PASSWORD="$MAC_CERT_PASSWORD"
            export APPLE_ID="$APPLE_ID_SECRET"
            export APPLE_APP_SPECIFIC_PASSWORD="$APPLE_APP_SPECIFIC_PASSWORD_SECRET"
            export APPLE_TEAM_ID="$APPLE_TEAM_ID_SECRET"
          else
            echo "No Developer ID cert — building unsigned (installs need xattr)."
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npm run ${{ matrix.script }}
        env:
          # Developer ID Application cert (.p12) as base64, plus its export password.
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          # notarytool credentials.
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: npm run ${{ matrix.script }}
      # Attach the freshly built installer(s) to this repo's Release for the tag —
      # from the SAME runner that built them, so it never depends on artifact
      # storage. Both jobs target the same release; action-gh-release create-or-
      # updates, and the concurrency group above keeps them from racing.
      - name: Attach installers to this repo's Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: Monad ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/latest*.yml
            dist/*.blockmap
