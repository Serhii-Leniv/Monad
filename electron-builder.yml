appId: com.serhiileniv.monad
productName: Monad
copyright: Copyright © Serhii Leniv

directories:
  buildResources: build
  output: dist

# Include the built app (out/) + production node_modules; exclude dev junk.
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!scripts/**'
  - '!.github/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!electron-builder.yml'
  - '!*.md'

# node-pty is a native module — keep its .node outside the asar so it can load.
asarUnpack:
  - '**/node_modules/@homebridge/**'

# We ship prebuilt node-pty binaries (see .npmrc); don't rebuild from source.
npmRebuild: false

# Update feed for electron-updater: this generates app-update.yml inside the
# packaged app (where the installed app looks for new versions) and latest*.yml
# next to the installers (the version manifests CI attaches to each Release).
# Publishing itself stays `--publish never` — the CI release step uploads.
publish:
  provider: github
  owner: Serhii-Leniv
  repo: Monad

# Ad-hoc sign the macOS app (no paid cert) so Apple Silicon doesn't flag it as
# "damaged". Runs after packing, before the dmg is built.
afterPack: scripts/afterPack.cjs

# macOS signing has two modes, chosen by whether signing credentials are present
# in the environment — nothing here needs editing to switch between them.
#
#   Credentials absent (local builds, forks, and CI until the secrets exist):
#     CSC_IDENTITY_AUTO_DISCOVERY=false makes electron-builder skip signing, and
#     it then skips notarization too ("app is not signed"). scripts/afterPack.cjs
#     ad-hoc signs so the app at least launches on Apple Silicon. Downloads stay
#     quarantined → macOS reports "damaged" → users run `xattr -dr
#     com.apple.quarantine`, as the README and download page explain.
#
#   Credentials present (CSC_LINK + CSC_KEY_PASSWORD, and APPLE_ID +
#     APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID):
#     electron-builder signs with the Developer ID cert under Hardened Runtime,
#     then notarizes and staples. Gatekeeper accepts it with no terminal step.
#
# See docs/RELEASING.md for how to produce those secrets.
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  icon: build/icon.png
  # Required for notarization; harmless when signing is skipped.
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  # `spctl --assess` fails for an unsigned/ad-hoc app and would abort the build in
  # the unsigned mode above. Notarization is the real gate, so don't also assess.
  gatekeeperAssess: false
  # Auto-skipped when the app wasn't signed; credentials come from the env.
  notarize: true

# Fixed (version-less) names so the site can link to a stable
# releases/latest/download/<name> URL that never goes stale.
dmg:
  artifactName: ${productName}-macOS-${arch}.dmg

win:
  target:
    - nsis
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-Windows-Setup.${ext}

linux:
  target:
    - AppImage
  category: Development
  icon: build/icon.png

appImage:
  artifactName: ${productName}-Linux-${arch}.${ext}
