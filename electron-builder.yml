appId: com.serhiileniv.monad
productName: Monad
copyright: Copyright © Serhii Leniv

directories:
  buildResources: build
  output: dist

# Include the built app (out/) + production node_modules; exclude dev junk.
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!scripts/*'
  - '!.github/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!electron-builder.yml'
  - '!*.md'

# node-pty is a native module — keep its .node outside the asar so it can load.
asarUnpack:
  - '**/node_modules/@homebridge/**'

# We ship prebuilt node-pty binaries (see .npmrc); don't rebuild from source.
npmRebuild: false

# Update feed for electron-updater: this generates app-update.yml inside the
# packaged app (where the installed app looks for new versions) and latest*.yml
# next to the installers (the version manifests CI attaches to each Release).
# Publishing itself stays `--publish never` — the CI release step uploads.
publish:
  provider: github
  owner: Serhii-Leniv
  repo: Monad

# Ad-hoc sign the macOS app (no paid cert) so Apple Silicon doesn't flag it as
# "damaged". Runs after packing, before the dmg is built.
afterPack: scripts/afterPack.cjs

mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  icon: build/icon.png
  # Unsigned for now (no Apple Developer cert). Gatekeeper will warn; the user
  # opens via right-click → Open the first time. Signing/notarization later.
  identity: null

# Fixed (version-less) names so the site can link to a stable
# releases/latest/download/<name> URL that never goes stale.
dmg:
  artifactName: ${productName}-macOS-${arch}.dmg

win:
  target:
    - nsis
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-Windows-Setup.${ext}

linux:
  target:
    - AppImage
  category: Development
  icon: build/icon.png

appImage:
  artifactName: ${productName}-Linux-${arch}.${ext}
