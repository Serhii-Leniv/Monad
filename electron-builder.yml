appId: com.serhiileniv.vectro
productName: Vectro
copyright: Copyright © Serhii Leniv

directories:
  buildResources: build
  output: dist

# Include the built app (out/) + production node_modules; exclude dev junk.
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!scripts/*'
  - '!.github/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!electron-builder.yml'
  - '!*.md'

# node-pty is a native module — keep its .node outside the asar so it can load.
asarUnpack:
  - '**/node_modules/@homebridge/**'

# We ship prebuilt node-pty binaries (see .npmrc); don't rebuild from source.
npmRebuild: false

mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  icon: build/icon.png
  # Unsigned for now (no Apple Developer cert). Gatekeeper will warn; the user
  # opens via right-click → Open the first time. Signing/notarization later.
  identity: null

dmg:
  artifactName: ${productName}-${version}-${arch}.dmg

win:
  target:
    - nsis
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-setup.${ext}

linux:
  target:
    - AppImage
  category: Development
  icon: build/icon.png
